name: Localization Workflow
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 1 * * 1'  # Every Monday at 1:00 AM UTC (minute hour day month weekday)
  workflow_dispatch:
env:
  crowdinAuthToken: ${{ secrets.CROWDIN_TOKEN }}
  
jobs:
  l10n:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Download l10nUtil.exe from nvaccess/nvdaL10n
        run: |
          # Download the latest release asset matching the pattern from the specified repository
          gh release download -R github.com/nvaccess/nvdaL10n -p "l10nUtil.exe" -D .
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Export translations
        run: |
          ./l10nUtil.exe exportTranslations -o ./_l10n -c addon
